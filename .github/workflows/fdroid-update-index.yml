name: Update F-Droid Index

on:
  push:
    branches: [ main ]
    paths:
      - 'repo/**.apk'   # only fires when an APK actually changes
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # fdroidserver is the official CLI tool; install from pip for latest version
      - name: Install fdroidserver
        run: |
          pip install fdroidserver --break-system-packages 2>/dev/null || \
          pip install fdroidserver

      # fdroid update reads config.yml + metadata/ and regenerates
      # index-v1.jar, index-v2.json, entry.jar inside repo/
      - name: Run fdroid update
        run: fdroid update --create-metadata --verbose

      - name: Commit updated index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add repo/index-v1.jar repo/index-v2.json repo/entry.jar \
                  repo/icons/ metadata/ || true

          if git diff --cached --quiet; then
            echo "Index unchanged, nothing to commit."
          else
            git commit -m "chore: regenerate F-Droid index"
            git push
          fi

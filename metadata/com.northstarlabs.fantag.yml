Name: FANTAG
Summary: Fantasy baseball roster tracker for your self-hosted FANTAG server
Description: |-
  FANTAG is a personal fantasy baseball roster management tool that connects
  to your self-hosted FANTAG server (FastAPI + React backend).

  Features:
  * Live lineup status from MLB Stats API and RotoWire
  * Roster and watch list management
  * ESPN Fantasy sync (private leagues via session cookies)
  * Player position history and usage pattern engine
  * Screenshot roster import via Claude Vision OCR
  * Backup and restore
  * Configurable server URL (supports local network or DDNS)

  This app is a native Android WebView wrapper for the FANTAG web interface.
  Requires a running FANTAG server instance on your home network.

